name: Deploy

on:
  push:
    branches: [main, develop]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Fly.io (staging)
        uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        run: |
          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://pdp-news-staging.fly.dev/api/healthcheck)
            if [ "$STATUS" = "200" ]; then
              echo "Staging is live!"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "Staging healthcheck failed"
          exit 1

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ${{ job.status == 'success' && '🟢' || '🔴' }} *Deploy Staging — ${{ job.status }}*

            💬 `${{ github.event.head_commit.message }}`
            👤 ${{ github.actor }}
            🔗 https://pdp-news-staging.fly.dev

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Fly.io (production)
        uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --config fly.production.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        run: |
          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://pdp-news-prod.fly.dev/api/healthcheck)
            if [ "$STATUS" = "200" ]; then
              echo "Production is live!"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "Production healthcheck failed"
          exit 1

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ${{ job.status == 'success' && '🟢' || '🔴' }} *Deploy Production — ${{ job.status }}*

            💬 `${{ github.event.head_commit.message }}`
            👤 ${{ github.actor }}
            🔗 https://pdp-news-prod.fly.dev

  rollback:
    if: failure() && github.ref == 'refs/heads/main'
    needs: deploy-production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Rollback to previous release
        run: |
          PREV=$(flyctl releases --app pdp-news-prod --json | jq -r '.[1].Version')
          echo "Rolling back to release $PREV"
          flyctl deploy --app pdp-news-prod --image-ref "$(flyctl releases --app pdp-news-prod --json | jq -r '.[1].ImageRef')" --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
