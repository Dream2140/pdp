name: Deploy

on:
  push:
    branches: [main, develop]

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Fly.io (staging)
        uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Fly.io (production)
        uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --config fly.production.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  rollback:
    if: failure() && github.ref == 'refs/heads/main'
    needs: deploy-production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Rollback to previous release
        run: |
          PREV=$(flyctl releases --app pdp-news-prod --json | jq -r '.[1].Version')
          echo "Rolling back to release $PREV"
          flyctl deploy --app pdp-news-prod --image-ref "$(flyctl releases --app pdp-news-prod --json | jq -r '.[1].ImageRef')" --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
