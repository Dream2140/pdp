name: Monitoring

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  e2e-monitoring:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps chromium

      - name: Run monitoring tests
        id: tests
        run: |
          npx playwright test e2e/monitoring.spec.ts --reporter=list 2>&1 | tee /tmp/results.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Parse results
        id: status
        run: |
          SUMMARY=$(tail -1 /tmp/results.txt | tr -d '\n' || echo "unknown")

          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            echo "emoji=🟢" >> $GITHUB_OUTPUT
            echo "overall=OK" >> $GITHUB_OUTPUT
          else
            echo "emoji=🔴" >> $GITHUB_OUTPUT
            echo "overall=FAILED" >> $GITHUB_OUTPUT
          fi

          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT

      - name: Send Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ${{ steps.status.outputs.emoji }} *Monitoring — ${{ steps.status.outputs.overall }}*

            🧪 Playwright E2E: `${{ steps.status.outputs.summary }}`
            🎯 Target: `pdp-news-prod.fly.dev`

            Tests:
            ✅ Healthcheck API
            ✅ Homepage + DB news
            ✅ Article page navigation
            ✅ Prometheus metrics
            ✅ Page load < 3s

            _${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}_
