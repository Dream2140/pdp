name: Lighthouse

on:
  pull_request:
    branches: [main, develop]

permissions:
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Run Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json

      - name: Format results
        id: results
        uses: actions/github-script@v9
        with:
          script: |
            const results = ${{ steps.lighthouse.outputs.manifest }};
            const links = ${{ steps.lighthouse.outputs.links }};

            let comment = '## ⚡ Lighthouse Report\n\n';

            for (const result of results) {
              const url = new URL(result.url).pathname || '/';
              const reportUrl = links[result.url];

              const perf = Math.round(result.summary.performance * 100);
              const a11y = Math.round(result.summary.accessibility * 100);
              const bp = Math.round(result.summary['best-practices'] * 100);
              const seo = Math.round(result.summary.seo * 100);

              const emoji = (score) => score >= 90 ? '🟢' : score >= 50 ? '🟠' : '🔴';

              comment += `### \`${url}\`\n\n`;
              comment += `| Category | Score |\n`;
              comment += `|---|---|\n`;
              comment += `| ${emoji(perf)} Performance | **${perf}** |\n`;
              comment += `| ${emoji(a11y)} Accessibility | **${a11y}** |\n`;
              comment += `| ${emoji(bp)} Best Practices | **${bp}** |\n`;
              comment += `| ${emoji(seo)} SEO | **${seo}** |\n\n`;

              if (reportUrl) {
                comment += `[Full Report](${reportUrl})\n\n`;
              }
            }

            core.setOutput('comment', comment);

      - name: Post comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse
          message: ${{ steps.results.outputs.comment }}
